# ~/.tmuxinator/srp.yml

name: srp
root: ~/src/getty/unisporkal/search

windows:
  - srp:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
        - webpacker:
            - echo "💡 Run 'npm run dev' or 'yarn dev' here"
        - railsserver:
            - echo "💡 Run 'rails s' here"

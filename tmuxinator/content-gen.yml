# ~/.tmuxinator/content-gen.yml

name: content-gen
root: ~/src/getty/unisporkal/federated-components/content-gen

windows:
  - aarp:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
            - echo "💡 Empty Terminal"
  - servers:
      layout: even-horizontal
      panes:
        - webpack:
            - echo "💡 Run 'giw' or 'yarn dev' here"
        - test:
            - echo "💡 run 'yarn jest' here"

# ~/.tmuxinator/adp.yml

name: adp
root: ~/src/getty/unisporkal/asset_detail

windows:
  - adp:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
            - echo "💡 Empty Terminal"
  - servers:
      layout: even-horizontal
      panes:
        - webpack:
            - echo "💡 Run 'giw' or 'yarn dev' here"
        - test:
            - echo "💡 Run 'rails s' here"

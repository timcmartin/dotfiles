# ~/.tmuxinator/cns.yml

name: cns
root: ~/src/getty/unisporkal/federated-components/customer-notifications

windows:
  - cns:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
  - cns-server:
      layout: even-horizontal
      panes:
        - dynamodb:
            - echo "💡 Run 'cd ~/src/getty/dynamodb_local_latest && export AWS_PROFILE=local' here"
        - yarn:
            - echo "💡 Run 'yarn dev' here"
        - ruby:
            - echo "💡 Run ruby service here"

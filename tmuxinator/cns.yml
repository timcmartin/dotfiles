# ~/.tmuxinator/cns.yml

name: cns
root: ~/src/getty/unisporkal/federated-components/customer-notifications

windows:
  - cns:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
  - cns-server:
      layout: even-horizontal
      panes:
        - dynamodb:
            - echo "💡 Run 'colima start' here, then 'gidynamodb-admin'"
        - yarn:
            - echo "💡 Run 'yarn dev' here"
        - ruby:
            - echo "💡 Run yarn ruby here"

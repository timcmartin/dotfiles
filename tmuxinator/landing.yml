# ~/.tmuxinator/landing.yml

name: landing
root: ~/src/getty/unisporkal/landing

windows:
  - landing:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
  - servers:
      layout: even-horizontal
      panes:
        - rails:
            - echo "💡 Run 'gir' here (rails server)"
        - assets:
            - echo "💡 Run 'giw' here (webpack dev server)"

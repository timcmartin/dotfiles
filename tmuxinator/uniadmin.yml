# ~/.tmuxinator/uniadmin.yml
name: uniadmin
root: ~/src/getty/unisporkal/misc_admin

windows:
  - uniadmin:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
            - echo "💡 Empty Terminal"
  - servers:
      layout: even-horizontal
      panes:
        - webserver:
            - echo "💡 Run 'giw' here (webpack dev server)"
        - rails:
            - echo "💡 Run 'gir' here (rails server)"
  - watchers:
      layout: even-horizontal
      panes:
        - lint:
            - echo "💡 Run 'watchlint' here (watch eslint)"
        - - jest:
              - echo "💡 Run 'wyj' here (jest tests)"
          - rspec:
              - echo "💡 Run 'giguard' here (rspec)"
  - logs:
      layout: even-horizontal
      panes:
        - devlog:
            - echo "💡 Run 'devlog' here (dev logs)"
        - unisporkal-log:
            - echo "💡 Run 'unilog' here (unisporkal logs)"

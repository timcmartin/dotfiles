# ~/.tmuxinator/wshl.yml

name: wshl
root: ~/Code/wshl/

windows:
  - wshl:
      layout: main-vertical
      panes:
        - nvim:
            - nvim
        - term:
  - services:
      layout: main-vertical
      panes:
        - guard:
            - echo "💡 Run 'guard' here"
        - redis:
            - echo "💡 Run 'redisup' here"
        - rails:
            - echo "💡 Run 'rails s' here"
  - logs:
      layout: main-vertical
      panes:
        - dev:
            - echo "💡 Run 'tail -f log/development.log' here"
        - test:
            - echo "💡 Run 'tail -f log/test.log' here"

# ~/.tmuxinator/cabin.yml

name: cabin
root: ~/src/personal/cabin-monitor/

windows:
  - cabin:
      layout: main-vertical
      panes:
        - nvim:
            - nvim
        - term:
  - server:
      layout: main-vertical
      panes:
        - server:
            - echo "💡 Run 'foreman start' here"
        - logs:
            - echo "💡 Run 'tail -f log/development.log' here"

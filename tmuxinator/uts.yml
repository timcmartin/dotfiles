# ~/.tmuxinator/uts.yml
name: uts
root: ~/src/getty/unisporkal

windows:
  - engine:
      layout: main-vertical
      panes:
        - nvim:
            - cd gems/unisporkal_engine
            - nvim
        - term:
            - cd gems/unisporkal_engine
  - cns:
      layout: main-vertical
      panes:
        - nvim:
            - cd cns
            - nvim
        - term:
            - cd cns
  - servers:
      layout: main-vertical
      panes:
        - landing-rails:
            - echo "💡 Run 'cd landing && gir' here"
        - landing-assets:
            - echo "💡 Run 'cd landing && giw' here"
        - cns-service:
            - echo "💡 Run 'cd cns && export AWS_PROFILE=local && gicns' here"

# ~/.tmuxinator/wurstwings.yml

name: wurstwings
root: ~/src/personal/wurstwings/

windows:
  - wurstwings:
      layout: main-vertical
      panes:
        - nvim:
            - nvim
        - term:
  - services:
      layout: main-vertical
      panes:
        - redis:
            - echo "💡 Run 'cd ~/Code/wurstwings && redisup' here"
        - foreman:
            - echo "💡 Run 'cd ~/Code/wurstwings && foreman start' here"
  - logs:
      layout: main-vertical
      panes:
        - dev:
            - echo "💡 Run 'tail -f log/development.log' here"
        - test:
            - echo "💡 Run 'tail -f log/test.log' here"

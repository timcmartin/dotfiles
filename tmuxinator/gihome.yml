# ~/.tmuxinator/gihome.yml

name: gihome
root: ~/src/getty/unisporkal

windows:
  - main:
      layout: main-vertical
      panes:
        - nvim:
            - nvim
        - term:
  - services:
      layout: main-vertical
      panes:
        - proxy:
            - echo "💡 Run 'giproxy-wfh' here"
        - dynamo:
            - echo "💡 Run 'cd $HOME/src/getty/gi-local-dynamo && bin/start' here"
  - servers:
      layout: main-vertical
      panes:
        - rails:
            - echo "💡 Run 'cd landing && gir' here"
        - assets:
            - echo "💡 Run 'cd landing && giw' here"

# ~/.tmuxinator/account.yml

name: account
root: ~/src/getty/unisporkal/account

windows:
  - account:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
  - servers:
      layout: even-horizontal
      panes:
        - webpacker:
            - echo "💡 Run 'npm run dev' or 'yarn dev' here"
        - railsserver:
            - echo "💡 Run 'rails s' here"

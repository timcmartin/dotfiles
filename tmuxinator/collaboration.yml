# ~/.tmuxinator/collaboration.yml

name: collaboration
root: ~/src/getty/unisporkal/collaboration

windows:
  - collaboration:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
  - servers:
      layout: even-horizontal
      panes:
        - rails:
            - echo "💡 Run 'gir' here (rails server)"
        - assets:
            - echo "💡 Run 'giw' here (webpack dev server)"

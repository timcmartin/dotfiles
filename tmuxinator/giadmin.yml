# ~/.tmuxinator/giadmin.yml

name: giadmin
root: ~/src/getty/unisporkal

windows:
  - main:
      layout: even-horizontal
      panes:
        - nvim:
            - nvim
        - term:
  - services:
      layout: even-horizontal
      panes:
        - proxy:
            - echo "💡 Run 'giproxy-a' here"
        - dynamo:
            - echo "💡 Run 'cd $HOME/src/getty/gi-local-dynamo && bin/start' here"
